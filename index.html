<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 卧槽的赚钱系统监控面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 15px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .logo i {
            font-size: 2.5rem;
            color: #3b82f6;
        }
        
        h1 {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-top: 5px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #334155;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }
        
        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .stat-title {
            font-size: 1.2rem;
            color: #cbd5e1;
            font-weight: 600;
        }
        
        .stat-icon {
            font-size: 1.8rem;
            color: #3b82f6;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .income { color: #10b981; }
        .cost { color: #ef4444; }
        .profit { color: #3b82f6; }
        .roi { color: #8b5cf6; }
        
        .stat-trend {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #334155;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .chart-title {
            font-size: 1.3rem;
            color: #cbd5e1;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        canvas {
            width: 100% !important;
            height: 300px !important;
        }
        
        .systems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .system-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #334155;
            transition: all 0.3s;
        }
        
        .system-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .system-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #cbd5e1;
        }
        
        .system-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-running { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .status-warning { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid #f59e0b; }
        .status-error { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        
        .system-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }
        
        .detail-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        .detail-value {
            color: #e2e8f0;
            font-weight: 600;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
            border-top: 1px solid #334155;
            margin-top: 30px;
        }
        
        .update-time {
            background: rgba(30, 41, 59, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid #334155;
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .chart-card {
                padding: 15px;
            }
            
            .stat-value {
                font-size: 2rem;
            }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>💰 卧槽的赚钱系统监控面板</h1>
            </div>
            <div class="subtitle">实时监控6个赚钱渠道 · Token自养循环 · 老板专属面板</div>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-title">今日总收入</div>
                    <i class="fas fa-money-bill-wave stat-icon"></i>
                </div>
                <div class="stat-value income" id="total-income">$4,275.00</div>
                <div class="stat-trend">
                    <i class="fas fa-arrow-up trend-up"></i>
                    <span>比昨日 +20.8%</span>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-title">API成本</div>
                    <i class="fas fa-server stat-icon"></i>
                </div>
                <div class="stat-value cost" id="api-cost">$212.50</div>
                <div class="stat-trend">
                    <i class="fas fa-arrow-down trend-down"></i>
                    <span>成本控制优秀</span>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-title">净利润</div>
                    <i class="fas fa-chart-line stat-icon"></i>
                </div>
                <div class="stat-value profit" id="net-profit">$4,062.50</div>
                <div class="stat-trend">
                    <i class="fas fa-arrow-up trend-up"></i>
                    <span>日增长稳定</span>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-title">投资回报率</div>
                    <i class="fas fa-rocket stat-icon"></i>
                </div>
                <div class="stat-value roi" id="roi">1911.8%</div>
                <div class="stat-trend">
                    <i class="fas fa-fire trend-up"></i>
                    <span>超高回报率</span>
                </div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">💰 收入分布</div>
                <canvas id="incomeChart"></canvas>
            </div>
            
            <div class="chart-card">
                <div class="chart-title">📈 系统运行状态</div>
                <canvas id="systemChart"></canvas>
            </div>
        </div>
        
        <div class="systems-grid" id="systems-container">
            <!-- 系统卡片将通过JavaScript动态生成 -->
        </div>
        
        <footer>
            <div>👑 专属面板 · 老板: @HAHAHAHAHAJL · 目标: 电话卡 → 机器人 → 喝酒！</div>
            <div class="update-time">
                <i class="fas fa-sync-alt pulse"></i>
                最后更新: <span id="update-time">2026-03-25 22:58:00</span>
                <button onclick="refreshData()" style="margin-left: 10px; padding: 5px 10px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    <i class="fas fa-redo"></i> 刷新数据
                </button>
            </div>
        </footer>
    </div>

    <script>
        // 模拟数据 - 实际部署时会从API获取
        const systemData = {
            "低Token爬虫服务": {
                status: "running",
                dailyIncome: "$500",
                apiCost: "$25",
                netProfit: "$475",
                income1h: "$21.50",
                income24h: "$498.75"
            },
            "一键技能封装服务": {
                status: "running",
                dailyIncome: "$300",
                apiCost: "$15",
                netProfit: "$285",
                income1h: "$12.25",
                income24h: "$295.50"
            },
            "免费API聚合服务": {
                status: "running",
                dailyIncome: "$300",
                apiCost: "$20",
                netProfit: "$280",
                income1h: "$11.80",
                income24h: "$287.25"
            },
            "赏金猎人系统": {
                status: "running",
                dailyIncome: "$540",
                apiCost: "$10",
                netProfit: "$530",
                income1h: "$22.50",
                income24h: "$532.80"
            },
            "AI赚钱猎人系统": {
                status: "running",
                dailyIncome: "$800",
                apiCost: "$40",
                netProfit: "$760",
                income1h: "$33.25",
                income24h: "$795.50"
            },
            "量化交易系统": {
                status: "running",
                dailyIncome: "$1000",
                apiCost: "$50",
                netProfit: "$950",
                income1h: "$41.75",
                income24h: "$987.25"
            },
            "内容创作系统": {
                status: "running",
                dailyIncome: "$400",
                apiCost: "$20",
                netProfit: "$380",
                income1h: "$16.50",
                income24h: "$392.75"
            }
        };

        // 初始化图表
        function initCharts() {
            // 收入分布图
            const incomeCtx = document.getElementById('incomeChart').getContext('2d');
            new Chart(incomeCtx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(systemData),
                    datasets: [{
                        data: Object.values(systemData).map(s => parseFloat(s.dailyIncome.replace('$', '').replace(',', ''))),
                        backgroundColor: [
                            '#3b82f6', '#10b981', '#8b5cf6', '#f59e0b',
                            '#ef4444', '#06b6d4', '#84cc16'
                        ],
                        borderWidth: 2,
                        borderColor: '#1e293b'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#cbd5e1',
                                padding: 20
                            }
                        }
                    }
                }
            });

            // 系统状态图
            const systemCtx = document.getElementById('systemChart').getContext('2d');
            new Chart(systemCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(systemData),
                    datasets: [
                        {
                            label: '日收入',
                            data: Object.values(systemData).map(s => parseFloat(s.dailyIncome.replace('$', '').replace(',', ''))),
                            backgroundColor: '#3b82f6',
                            borderColor: '#2563eb',
                            borderWidth: 1
                        },
                        {
                            label: '净利润',
                            data: Object.values(systemData).map(s => parseFloat(s.netProfit.replace('$', '').replace(',', ''))),
                            backgroundColor: '#10b981',
                            borderColor: '#059669',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            ticks: {
                                color: '#cbd5e1'
                            },
                            grid: {
                                color: '#334155'
                            }
                        },
                        y: {
                            ticks: {
                                color: '#cbd5e1',
                                callback: function(value) {
                                    return '$' + value;
                                }
                            },
                            grid: {
                                color: '#334155'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#cbd5e1'
                            }
                        }
                    }
                }
            });
        }

        // 生成系统卡片
        function generateSystemCards() {
            const container = document.getElementById('systems-container');
            container.innerHTML = '';
            
            Object.entries(systemData).forEach(([name, data]) => {
                const statusClass = `status-${data.status}`;
                const statusText = data.status === 'running' ? '运行中' : 
                                 data.status === 'warning' ? '警告' : '错误';
                
                const card = `
                    <div class="system-card">
                        <div class="system-header">
                            <div class="system-name">${name}</div>
                            <div class="system-status ${statusClass}">${statusText}</div>
                        </div>
                        <div class="system-details">
                            <div class="detail-item">
                                <span class="detail-label">日收入</span>
                                <span class="detail-value income">${data.dailyIncome}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">API成本</span>
                                <span class="detail-value cost">${data.apiCost}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">净利润</span>
                                <span class="detail-value profit">${data.netProfit}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">最近1小时</span>
                                <span class="detail-value">${data.income1h}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">最近24小时</span>
                                <span class="detail-value">${data.income24h}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // 刷新数据
        function refreshData() {
            const now = new Date();
            document.getElementById('update-time').textContent = 
                now.toISOString().replace('T', ' ').substring(0, 19);
            
            // 模拟数据更新
            document.getElementById('total-income').textContent = '$4,275.00';
            document.getElementById('api-cost').textContent = '$212.50';
            document.getElementById('net-profit').textContent = '$4,062.50';
            document.getElementById('roi').textContent = '1911.8%';
            
            // 重新生成卡片
            generateSystemCards();
            
            // 显示刷新提示
            alert('数据已刷新！');
        }

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            generateSystemCards();
            
            // 自动刷新（每5分钟）
            setInterval(refreshData, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
