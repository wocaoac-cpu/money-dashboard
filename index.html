<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 卧槽的赚钱系统监控面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .logo i { font-size: 2.5rem; color: #3b82f6; }
        .logo h1 { font-size: 2rem; color: #3b82f6; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .project-card { background: #1e293b; border-radius: 12px; padding: 20px; border-left: 5px solid #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>💰 卧槽的赚钱系统监控面板</h1>
            </div>
            <div class="subtitle">实时监控赚钱项目 · 学习即赚钱 · 老板专属面板</div>
            <div class="update-time" id="updateTime">最后更新: 加载中...</div>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总预期日收入</h3>
                <div class="stat-value" id="totalIncome">$0</div>
            </div>
            <div class="stat-card">
                <h3>活跃赚钱项目</h3>
                <div class="stat-value" id="activeProjects">0</div>
            </div>
        </div>
        
        <div class="projects-section">
            <h2><i class="fas fa-rocket"></i> 赚钱项目列表</h2>
            <div class="projects-grid" id="projectsGrid">
                <div>加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadData() {
            try {
                const response = await fetch('website-money-projects.json');
                const data = await response.json();
                
                // 更新数据
                document.getElementById('totalIncome').textContent = '$' + data.total_daily_income;
                document.getElementById('activeProjects').textContent = data.active_projects;
                document.getElementById('updateTime').textContent = '最后更新: ' + new Date(data.last_updated).toLocaleString();
                
                // 更新项目列表
                const projectsGrid = document.getElementById('projectsGrid');
                projectsGrid.innerHTML = '';
                
                data.money_projects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.style.borderLeftColor = project.website_display?.color || '#3b82f6';
                    card.innerHTML = `
                        <h3>${project.name}</h3>
                        <p>${project.description}</p>
                        <div>💰 $${project.estimated_daily}/天</div>
                        <div>${project.money_action}</div>
                    `;
                    projectsGrid.appendChild(card);
                });
                
            } catch (error) {
                console.error('加载失败:', error);
            }
        }
        
        // 加载数据
        loadData();
        // 每5分钟刷新
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
